services:
  oracle:
    image: gvenzl/oracle-free:slim-faststart
    container_name: oracle-db
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: demo123
    shm_size: 2g
    deploy:
      resources:
        limits:
          memory: 3g

  mysql:
    image: mysql:8.0
    container_name: mysql-db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: demo123
    deploy:
      resources:
        limits:
          memory: 1g

  oracledb_exporter:
    image: ghcr.io/iamseth/oracledb_exporter:latest
    container_name: oracle_exporter
    environment:
      DATA_SOURCE_NAME: oracle://system:demo123@oracle-db:1521/FREE
      CUSTOM_METRICS: /custom-metrics.toml
    ports:
      - "9161:9161"
    volumes:
      - ./oracledb_exporter/custom-metrics.toml:/custom-metrics.toml:ro
    depends_on:
      - oracle

  mysqld_exporter:
    image: prom/mysqld-exporter:latest
    container_name: mysqld_exporter
    environment:
      - MYSQLD_EXPORTER_PASSWORD=demo123
    ports:
      - "9104:9104"
    command:
      - "--mysqld.address=mysql-db:3306"
      - "--mysqld.username=root"
    depends_on:
      - mysql

  node_exporter_oracle:
    image: prom/node-exporter:latest
    container_name: node_exporter_oracle
    network_mode: "service:oracle" # Shares network/pid with oracle for accurate host metrics
    pid: "service:oracle"
    volumes:
      - /:/host:ro,rslave
    command:
      - '--path.rootfs=/host'
    depends_on:
      - oracle

  node_exporter_mysql:
    image: prom/node-exporter:latest
    container_name: node_exporter_mysql
    network_mode: "service:mysql"
    pid: "service:mysql"
    volumes:
      - /:/host:ro,rslave
    command:
      - '--path.rootfs=/host'
    depends_on:
      - mysql

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./alert_rules.yml:/etc/prometheus/alert_rules.yml
      - prometheus_data:/prometheus
    ports:
      - "9091:9090"

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'

  mailpit:
    image: axllent/mailpit
    container_name: mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
