global:
  resolve_timeout: 5m
  smtp_smarthost: "mailpit:1025"
  smtp_from: "alertmanager@example.com"
  smtp_require_tls: false

route:
  receiver: default-email
  group_by: ["environment", "service", "severity", "alertname"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h
  routes:
    - matchers:
        - severity="critical"
        - category=~"availability|operational"
      receiver: pager-webhook
      group_wait: 10s
      group_interval: 2m
      repeat_interval: 30m
      continue: true

    - matchers:
        - severity="critical"
      receiver: critical-email
      group_wait: 10s
      group_interval: 2m
      repeat_interval: 30m

    - matchers:
        - severity="warning"
      receiver: team-chat-webhook
      group_wait: 1m
      group_interval: 10m
      repeat_interval: 4h
      continue: true

    - matchers:
        - severity="warning"
      receiver: warning-email

    - matchers:
        - service="oracle"
      receiver: oracle-team-email

    - matchers:
        - service="mysql"
      receiver: mysql-team-email

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: ["service", "instance", "environment"]

  - source_matchers:
      - category="availability"
      - severity="critical"
    target_matchers:
      - category=~"capacity|performance"
      - severity=~"warning|critical"
    equal: ["service", "instance", "environment"]

receivers:
  - name: default-email
    email_configs:
      - to: "admin@example.com"
        send_resolved: true
        headers:
          Subject: "[Monitoring] {{ .CommonLabels.alertname }}"

  - name: pager-webhook
    webhook_configs:
      - url: "http://alert-webhook:8080/pager"
        send_resolved: true

  - name: team-chat-webhook
    webhook_configs:
      - url: "http://alert-webhook:8080/team-chat"
        send_resolved: true

  - name: critical-email
    email_configs:
      - to: "dba-oncall@example.com"
        send_resolved: true
        headers:
          Subject: "[CRITICAL] {{ .CommonLabels.alertname }}"

  - name: warning-email
    email_configs:
      - to: "dba-team@example.com"
        send_resolved: true
        headers:
          Subject: "[WARNING] {{ .CommonLabels.alertname }}"

  - name: oracle-team-email
    email_configs:
      - to: "oracle-dba@example.com"
        send_resolved: true
        headers:
          Subject: "[Oracle] {{ .CommonLabels.alertname }}"

  - name: mysql-team-email
    email_configs:
      - to: "mysql-dba@example.com"
        send_resolved: true
        headers:
          Subject: "[MySQL] {{ .CommonLabels.alertname }}"
