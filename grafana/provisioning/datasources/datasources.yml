apiVersion: 1

deleteDatasources: []

datasources:
  # Prometheus for metrics collection
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "15s"
      httpMethod: POST
    uid: prometheus

  # MySQL Direct Connection for Security/Compliance queries
  - name: MySQL
    type: mysql
    url: mysql-db:3306
    database: mysql
    user: root
    editable: true
    secureJsonData:
      password: demo123
    uid: mysql-datasource
    jsonData:
      maxOpenConns: 0
      maxIdleConns: 2
      connMaxLifetime: 14400
