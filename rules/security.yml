groups:
  - name: security_alerts
    rules:
      - alert: OracleUserPasswordExpired
        expr: oracledb_user_expiry_days_value <= 0
        for: 15m
        labels:
          severity: critical
          service: oracle
          db_engine: oracle
          environment: pilot
          team: dba
          owner: dba-team
          category: security
        annotations:
          summary: "Oracle user password expired"
          description: "User {{ $labels.username }} has expired credentials (days={{ $value }})."
          impact: "Potential login failures and service disruptions for affected account."
          action: "Reset password or exempt account according to security policy."
          runbook_url: "https://runbooks.example.com/db/oracle-user-expiry"

      - alert: OracleUserPasswordExpiryRisk
        expr: oracledb_user_expiry_days_value > 0 and oracledb_user_expiry_days_value <= 7
        for: 30m
        labels:
          severity: warning
          service: oracle
          db_engine: oracle
          environment: pilot
          team: dba
          owner: dba-team
          category: security
        annotations:
          summary: "Oracle user password near expiry"
          description: "User {{ $labels.username }} expires in {{ $value }} days."
          impact: "Account may expire soon and impact application access."
          action: "Notify owner and rotate credentials before expiry."
          runbook_url: "https://runbooks.example.com/db/oracle-user-expiry"

      - alert: MySQLPasswordPolicyDisabled
        expr: mysql_global_variables_default_password_lifetime == 0
        for: 1h
        labels:
          severity: warning
          service: mysql
          db_engine: mysql
          environment: pilot
          team: dba
          owner: dba-team
          category: security
        annotations:
          summary: "MySQL password lifetime policy disabled"
          description: "default_password_lifetime is 0 on {{ $labels.instance }}."
          impact: "Passwords may never expire, increasing credential risk."
          action: "Set default_password_lifetime per DBA security standard."
          runbook_url: "https://runbooks.example.com/db/mysql-password-policy"
