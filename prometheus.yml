global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'node_db1'
    static_configs:
      - targets: ['oracle-db1:9100']
  - job_name: 'node_db2'
    static_configs:
      - targets: ['oracle-db2:9100']
  - job_name: 'oracle_db1'
    static_configs:
      - targets: ['oracledb_exporter1:9161']
  - job_name: 'oracle_db2'
    static_configs:
      - targets: ['oracledb_exporter2:9161']
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']